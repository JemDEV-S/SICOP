name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma validate
        env:
          DATABASE_URL: mysql://app:password@localhost:3306/munisanjeronimo
      - run: npm run lint
      - run: npm run build
